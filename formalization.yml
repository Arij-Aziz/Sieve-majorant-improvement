name: SieveMajorantImprovement
paper_title: "Rigidity of the Selberg Majorant: Stability, Restriction, and a Quadratic Form Identity with Machine-Verified Proofs"
url: "https://github.com/Arij-Aziz/Sieve-majorant-improvement"

toolchain: leanprover/lean4:v4.28.0
mathlib_rev: v4.28.0

sorry_free: true
axioms: [propext, Classical.choice, Quot.sound]

main_results:

  - name: selbergComparison_massImprovement
    file: RequestProject/Core/SelbergComparison.lean
    description: >
      For d ≥ 2, m ≥ 1, the Selberg-shaped majorant ν(x) = 1 if d∤x, ν(x) = 1/2 if d∣x
      on Fin(d·m) has strictly smaller L¹ mass than the constant baseline ν₀ ≡ 1.

  - name: sieveMajorant_l2_improvement
    file: RequestProject/Core/Weights/FourierConnection.lean
    description: >
      For d ≥ 2, m ≥ 1, the Selberg majorant has strictly smaller L² norm
      than the constant baseline.

  - name: selbergComparison_dual_improvement
    file: RequestProject/Core/Weights/FourierConnection.lean
    description: >
      For d ≥ 2, m ≥ 1, the Selberg majorant simultaneously achieves strict
      mass and strict L² improvement over the constant baseline.

  - name: sieveMajorant_l2NormSq_eq_selbergForm
    file: RequestProject/Core/Weights/FourierConnection.lean
    description: >
      The normalized spatial L² norm satisfies ‖ν‖₂²/(d·m) = 1 − 3/(4d),
      equal to the Selberg quadratic form Q(λ) at λ₁ = 1, λ_d = −1/2.

  - name: restriction_lower_bound
    file: RequestProject/Core/RestrictionLowerBound.lean
    description: >
      For any nonneg majorant ν on Fin(N) dominating the 0-1 indicator of a set S:
      mass(ν)² · ‖ν‖₂² ≥ |S|⁴ / N.
      Proved from Cauchy–Schwarz and pointwise domination alone; no Fourier hypothesis.

  - name: sieve_additive_energy_lower
    file: RequestProject/Core/RestrictionLowerBound.lean
    description: >
      For any nonneg majorant ν dominating indicator of S on Fin(N):
      E(ν) ≥ targetMass⁴ / N³.

  - name: restriction_lower_bound_zero_mode
    file: RequestProject/Core/RestrictionLowerBound.lean
    description: >
      Fourier reformulation of the restriction lower bound via Parseval:
      targetMass⁴ ≤ N · mass² · ‖ν̂‖₂² / N.

  - name: selberg_restriction_lower_bound_explicit
    file: RequestProject/Core/SelbergRestriction.lean
    description: >
      Concrete instantiation for the Selberg majorant:
      mass(ν)² · ‖ν‖₂² ≥ (dm − m)⁴ / (dm).

  - name: selberg_additive_energy_explicit
    file: RequestProject/Core/SelbergRestriction.lean
    description: >
      Additive energy lower bound for the Selberg majorant:
      E(ν) ≥ (dm − m)⁴ / (dm)³.

  - name: selberg_mass_energy_interval
    file: RequestProject/Core/SelbergRestriction.lean
    description: >
      The mass-energy product of the Selberg majorant lies strictly between
      the restriction lower bound and the baseline upper bound:
      (dm−m)⁴/(dm) ≤ mass(ν)²·‖ν‖₂² < (dm)³.
      This is the machine-verified form of the Section 6 interdependence claim.

  - name: perturbation_propagates
    file: RequestProject/Core/KineticPropagation.lean
    description: >
      Kinetic Propagation Theorem: if |f(p) − g(p)| ≤ ε at every sieving prime,
      then for squarefree d with ω(d) prime factors each bounded by M,
      |f(d) − g(d)| ≤ ε · ω(d) · M^(ω(d)−1). Pointwise, exact, no big-O.

  - name: eulerProduct_stability
    file: RequestProject/Core/KineticPropagation.lean
    description: >
      The partial Euler product V(f,D) = Σ_{d∈D} 1/f(d) is stable under
      prime-level perturbation, with explicit error bound.

  - name: sieveH_stable
    file: RequestProject/Core/KineticPropagation.lean
    description: >
      The arithmetic H-functional H(f,D) = Σ (f(d)/d)·log(f(d)/d) is stable
      under prime-level perturbation, with Lipschitz constant via the MVT.

  - name: Nat.Squarefree.lcm
    file: RequestProject/Core/Weights/QuadFormStability.lean
    description: >
      The lcm of two squarefree natural numbers is squarefree.
      Proved from first principles via prime factorization and max of valuations.
      Infrastructure lemma for quadForm_kinetic_stability.

  - name: inv_diff_bound
    file: RequestProject/Core/Weights/QuadFormStability.lean
    description: >
      For positive reals a, b: |1/a − 1/b| ≤ |a − b| / (a·b).
      First-principles algebraic lemma; no Mathlib dependency.

  - name: quadForm_term_diff
    file: RequestProject/Core/Weights/QuadFormStability.lean
    description: >
      Pointwise bound on each (d,e) term of the quadratic form difference:
      |λ_d·λ_e/f(n) − λ_d·λ_e/g(n)| ≤ |λ_d|·|λ_e|·|f(n)−g(n)|/(f(n)·g(n)).

  - name: quadForm_term_bound
    file: RequestProject/Core/Weights/QuadFormStability.lean
    description: >
      Per-term bound for quadForm_kinetic_stability: handles the squarefree
      case split and applies quadForm_term_diff at each (d,e) pair.
      
  - name: quadForm_kinetic_stability
    file: RequestProject/Core/Weights/QuadFormStability.lean
    description: >
      The Selberg quadratic form Q(λ,f) is Lipschitz in f at the level of
      squarefree divisors: if |f(n)−g(n)| is controlled by the kinetic
      propagation bound at every squarefree n, then |Q(λ,f)−Q(λ,g)| is
      bounded by an explicit double sum. This is the machine-verified
      connection between Theorem 3 (kinetic propagation) and Theorem 1
      (quadratic form identity) — the theorem that makes the
      interdependence claim mathematically precise rather than narrative.

audit:
  file: RequestProject/Audit.lean
  date: "2026-06-04"
  theorem_count: 18
  output: >
    All 18 theorems verified with #print axioms.
    Every theorem depends only on [propext, Classical.choice, Quot.sound].
    Zero sorry.

dependencies:
  - name: Mathlib
    git: "https://github.com/leanprover-community/mathlib4.git"
    rev: v4.28.0

build:
  - lake exe cache get
  - lake build
