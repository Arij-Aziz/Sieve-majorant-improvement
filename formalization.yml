# formalization.yaml (v0.3)
version: "v0.3"

project:
  name: "SieveMajorantImprovement"
  authors:
    - "Arij Aziz"
    id: "https://github.com/Arij-Aziz/Sieve-majorant-improvement"
  license: "Apache-2.0"

status:
  scope: >
    Four independent results about the single-prime Selberg majorant
    ν(x) = 1 if d∤x, 1/2 if d∣x on Fin(d·m). (1) Mass and L² improvement
    over the constant baseline, plus the quadratic form identity
    ‖ν‖₂²/(d·m) = 1 − 3/(4d). (2) Abstract and concrete restriction lower
    bounds via Cauchy–Schwarz, with Fourier restatement via Parseval.
    (3) Kinetic propagation: pointwise Lipschitz bound on multiplicative
    sieve densities under prime-level perturbation, with Euler product and
    H-functional stability. (4) Lipschitz stability of the Selberg quadratic
    form Q(λ,f) under the kinetic bound. Does NOT cover the full multi-prime
    Selberg sieve, asymptotic results, or extremality of ν.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms:
    - propext
    - Classical.choice
    - Quot.sound
  main_results:

    - declaration: selbergComparison_massImprovement
      file: RequestProject/Core/SelbergComparison.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: "Selberg sieve mass bound: mass(ν) < N for the single-prime majorant"
          source: "Iwaniec–Kowalski, Analytic Number Theory, Ch. 6"

    - declaration: sieveMajorant_l2_improvement
      file: RequestProject/Core/Weights/FourierConnection.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    - declaration: selbergComparison_dual_improvement
