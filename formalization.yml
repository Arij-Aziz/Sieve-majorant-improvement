fidelity:
  divergences: >
    (1) Results cover the single-prime model only (one sieving prime d);
    the full multi-prime Selberg sieve is not formalized.
    (2) The restriction lower bound (Theorem 2) is a direct Cauchy–Schwarz
    consequence and is not comparable to Green–Tao or Bera–Viswanadham
    restriction theorems, which go in the opposite direction.
    (3) No asymptotic results, no density estimates, no big-O.
    (4) The Future/ directory contains scaffolding that is not part of the
    proof chain and is excluded from the axiom audit.
    (5) Nat.Squarefree.lcm was absent from Mathlib v4.28.0 and is proved
    from first principles in this project.

review:
  status: "agent-reviewed, self-assessed"
  reviewers:
    - "Arij Aziz (author)"
    - "Aristotle (AI agent)"
    - "Codex (AI agent)"
  notes: >
    All 20 theorems verified via #print axioms in RequestProject/Audit.lean.
    Axiom footprint confirmed as [propext, Classical.choice, Quot.sound] for
    every result. Zero sorry. lake build passes cleanly on
    leanprover/lean4:v4.28.0 + Mathlib v4.28.0. Pending human peer review.

